services:
  db:
    image: postgres:15-alpine
    container_name: telesync_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telesync}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - telesync_net
 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telesync_backend
    restart: always
    command: >
      bash -c "echo 'Waiting for PostgreSQL...' &&
               while ! nc -z db 5432; do sleep 1; done &&
               echo 'PostgreSQL is ready, running migrations...' &&
               python manage.py migrate &&
               gunicorn telesync.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db
    networks:
      - telesync_net

  redis:
    image: redis:7-alpine
    container_name: telesync_redis
    restart: always
    networks:
      - telesync_net

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telesync_celery_worker
    restart: always
    command: celery -A telesync worker --loglevel=info
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - telesync_net

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telesync_celery_beat
    restart: always
    command: celery -A telesync beat --loglevel=info
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - telesync_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: telesync_client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - telesync_net

networks:
  telesync_net:
    driver: bridge

volumes:
  postgres_data:
