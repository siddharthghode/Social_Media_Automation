version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: telesync_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telesync}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telesync_backend
    restart: always
    command: >
      bash -c "python manage.py migrate &&
               gunicorn telesync.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telesync_scheduler
    restart: always
    command: python manage.py run_scheduler
    depends_on:
      - backend
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: telesync_client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
